<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:   #fafaf8;
  --off:     #f2f0ec;
  --light:   #e4e2dc;
  --mid:     #9a9890;
  --dark:    #3a3835;
  --black:   #1a1917;
  --accent:  #c8a882;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  background: var(--white);
  color: var(--black);
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed; z-index: 9999;
  width: 8px; height: 8px;
  background: var(--black);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: width .2s, height .2s, background .2s, border-color .2s;
}
.cursor.white { background: #fff; }
.cursor.big {
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--black);
}
.cursor.white.big {
  border-color: #fff;
}

/* ── HORIZONTAL WRAPPER ── */
.h-wrap {
  display: flex;
  height: 100vh;
  width: max-content;
  will-change: transform;
}

/* ── PANEL BASE ── */
.panel {
  height: 100vh;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

/* ══════════════
   HERO
══════════════ */
.panel-hero {
  width: 100vw;
  height: 100vh;
  background: var(--white);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 10vh 8vw 72px;
  overflow: hidden;
}
.hero-illust {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-40%, -50%);
  width: 90vw; height: 90vh;
  object-fit: contain;
  object-position: center center;
  opacity: .2;
}
.hero-text { position: relative; z-index: 1; }
.hero-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: .45em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 16px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 9vw, 120px);
  font-weight: 200; line-height: 1;
  letter-spacing: .04em;
  color: var(--black);
  white-space: nowrap;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
}
.hero-sub {
  margin-top: 28px;
  font-size: 13px; letter-spacing: .2em;
  color: var(--mid); line-height: 2;
}
.hero-sub span { color: var(--black); }
.hero-scroll {
  position: absolute;
  bottom: 10vh; right: 8vw;
  display: flex; flex-direction: row;
  align-items: center; gap: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .35em;
  text-transform: uppercase; color: var(--mid);
}
.hero-scroll::after {
  content: ''; height: 1px; width: 52px;
  background: linear-gradient(to right, var(--mid), transparent);
  animation: scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine {
  0%,100% { opacity:.3; transform:scaleX(.4); transform-origin:left; }
  50%      { opacity:1; transform:scaleX(1); }
}

/* ══════════════
   CONCEPT
══════════════ */
.panel-concept {
  width: 100vw;
  height: 100vh;
  background: var(--black);
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}
.concept-left {
  padding: 14vh 8vw;
  display: flex; flex-direction: column;
  justify-content: center;
  overflow: hidden;
}
.concept-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  margin-bottom: 32px;
}
.concept-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(22px, 4vw, 48px);
  font-weight: 200; font-style: italic;
  line-height: 1.25; color: #fff;
  margin-bottom: 28px;
}
.concept-title em { color: var(--accent); font-style: normal; }
.concept-body {
  font-size: 13px; line-height: 2.3;
  color: rgba(255,255,255,.5);
  border-left: 1px solid rgba(255,255,255,.1);
  padding-left: 20px;
}
.concept-anagram {
  margin-top: 44px;
  display: flex; gap: 0; align-items: baseline;
}
.anagram-you {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; font-weight: 200;
  color: rgba(255,255,255,.15);
  letter-spacing: -.02em;
}
.anagram-plus {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: rgba(255,255,255,.2);
  margin: 0 8px;
}
.anagram-risou {
  font-size: 13px; letter-spacing: .2em;
  color: rgba(255,255,255,.25);
  writing-mode: vertical-rl;
  margin-left: 16px;
}
.anagram-eq {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: rgba(255,255,255,.2);
  margin: 0 8px;
}
.anagram-result {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 200; font-style: italic;
  color: var(--accent);
  letter-spacing: .06em;
}
.concept-right {
  position: relative; overflow: hidden;
}
.concept-illust {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: .35;
  filter: grayscale(30%);
}

/* ══════════════
   PROCESS
══════════════ */
.panel-process {
  width: max-content;
  min-width: 100vw;
  background: var(--off);
  display: flex;
  align-items: stretch;
}
.process-header {
  width: 28vw; min-width: 280px;
  padding: 14vh 6vw;
  display: flex; flex-direction: column;
  justify-content: center;
  flex-shrink: 0;
  border-right: 1px solid var(--light);
}
.process-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 20px;
}
.process-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: var(--black);
}
.process-desc {
  margin-top: 24px;
  font-size: 12px; color: var(--mid);
  line-height: 2;
}
/* ══════════════
   PROCESS
══════════════ */
.panel-process {
  width: max-content;
  background: var(--off);
  display: flex;
  align-items: stretch;
  position: relative;
}
.process-header {
  position: sticky; left: 0;
  width: 26vw; min-width: 240px;
  padding: 14vh 5vw;
  display: flex; flex-direction: column;
  justify-content: center;
  flex-shrink: 0;
  border-right: 1px solid var(--light);
  background: var(--off);
  z-index: 2;
}
.process-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 20px;
}
.process-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: var(--black);
}
.process-desc {
  margin-top: 24px;
  font-size: 12px; color: var(--mid);
  line-height: 2;
}
.process-steps {
  display: flex;
  align-items: stretch;
}
.step {
  width: 74vw; flex-shrink: 0;
  border-right: 1px solid var(--light);
  display: flex; flex-direction: column;
  position: relative;
  transition: background .3s;
}
.step:hover { background: var(--white); }
.step-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px; font-weight: 200;
  color: var(--light);
  line-height: 1;
  padding: 5vh 10vw 0;
  flex-shrink: 0;
}
.step-photo {
  width: 100%; height: 42vh;
  object-fit: cover;
  filter: grayscale(30%);
  transition: filter .4s;
  flex-shrink: 0;
}
.step:hover .step-photo { filter: grayscale(0); }
.step-ph {
  width: 100%; height: 42vh;
  background: linear-gradient(135deg, var(--light) 0%, var(--off) 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-ph span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: var(--mid);
}
.step-body {
  padding: 3vh 10vw 4vh;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  justify-content: flex-start;
  overflow: hidden;
}
.step-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: .25em;
  color: var(--mid); margin-bottom: 10px;
}
.step-name {
  font-size: 18px; font-weight: 400;
  letter-spacing: .12em; color: var(--black);
  margin-bottom: 10px;
}
.step-memo {
  font-size: 13px; color: var(--mid);
  line-height: 1.9;
}

/* ══════════════
   GALLERY
══════════════ */
.panel-gallery {
  width: max-content;
  background: var(--black);
  display: flex;
  align-items: stretch;
  position: relative;
}
.gallery-header {
  position: sticky; left: 0;
  width: 22vw; min-width: 200px;
  padding: 14vh 4vw;
  display: flex; flex-direction: column;
  justify-content: center; flex-shrink: 0;
  border-right: 1px solid rgba(255,255,255,.06);
  background: var(--black);
  z-index: 2;
}
.gallery-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  margin-bottom: 20px;
}
.gallery-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 3.5vw, 42px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: #fff;
}
.gallery-count {
  margin-top: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 200;
  color: rgba(255,255,255,.08);
}
.gallery-photos {
  display: flex; align-items: stretch;
}
.g-photo {
  width: 74vw; flex-shrink: 0;
  display: flex; flex-direction: column;
  position: relative;
  border-right: 1px solid rgba(255,255,255,.06);
  transition: background .3s;
}
.g-photo:hover { background: rgba(255,255,255,.02); }
.g-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px; font-weight: 200;
  color: rgba(255,255,255,.08);
  line-height: 1;
  padding: 10vh 10vw 0;
  flex-shrink: 0;
}
.g-body {
  padding: 16px 10vw 20px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  justify-content: flex-start;
}
.g-name {
  font-size: 18px; font-weight: 400;
  letter-spacing: .12em; color: #fff;
  margin-bottom: 10px;
}
.g-memo-text {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; font-weight: 300;
  letter-spacing: .08em; line-height: 1.9;
  color: rgba(255,255,255,.5);
}
.g-media {
  width: 100%; height: 45vh;
  overflow: hidden; position: relative; cursor: zoom-in;
  flex-shrink: 0;
}
.g-media img, .g-media video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  filter: grayscale(15%) brightness(.88);
  transition: filter .5s, transform .6s cubic-bezier(.22,1,.36,1);
}
.g-photo:hover .g-media img,
.g-photo:hover .g-media video { filter: grayscale(0) brightness(1); transform: scale(1.03); }
.g-ph-dark {
  height: 100%; width: 100%;
  background: linear-gradient(135deg, #252320 0%, #1a1917 100%);
  display: flex; align-items: center; justify-content: center;
}
.g-ph-dark span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: rgba(255,255,255,.15);
}

/* ══════════════
   QA
══════════════ */
.panel-qa {
  width: 100vw;
  background: #f2f0ec;
  flex-shrink: 0;
  display: flex;
  overflow: hidden;
}
.qa-inner {
  width: 100%;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
/* スクロールバー非表示 */
.qa-inner::-webkit-scrollbar { display: none; }
.qa-inner { -ms-overflow-style: none; scrollbar-width: none; }

.qa-header {
  padding: 10vh 5vw 4vh;
}
.qa-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 16px;
}
.qa-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 200; font-style: italic;
  line-height: 1.3; color: var(--black);
}
.qa-list {
  padding: 0 5vw 50vh;
  display: flex; flex-direction: column;
  gap: 0;
}
.qa-item {
  display: grid;
  grid-template-columns: 2rem 1fr;
  gap: 0 14px;
  padding: 32px 0;
  border-top: 1px solid var(--light);
}
.qa-item:last-child { border-bottom: 1px solid var(--light); }
.qa-type {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 200; font-style: italic;
  color: var(--mid);
  padding-top: 2px;
}
.qa-type.answer { color: var(--accent); }
.qa-content {}
.qa-question {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px; font-weight: 400;
  letter-spacing: .08em; line-height: 1.9;
  color: var(--black);
  margin-bottom: 4px;
}
.qa-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: .2em;
  color: var(--mid); margin-bottom: 8px;
}
.qa-answer {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px; font-weight: 300;
  letter-spacing: .06em; line-height: 2.1;
  color: var(--mid);
}

/* ══════════════
   STICKY FOOTER
══════════════ */
.h-wrap {
  padding-bottom: 52px;
}
.sticky-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(26,25,23,.92);
  backdrop-filter: blur(12px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 300;
  color: rgba(255,255,255,.4);
  letter-spacing: .15em;
}
.footer-share {
  display: flex; gap: 6px;
}
.footer-share-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 16px;
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.4);
  border: 0.5px solid rgba(255,255,255,.12);
  background: none; cursor: pointer;
  transition: color .2s, border-color .2s;
  font-family: inherit;
}
.footer-share-btn:hover { color: #fff; border-color: rgba(255,255,255,.4); }
.footer-share-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── PROGRESS BAR ── */
.progress-bar {
  position: fixed; top: 0; left: 0;
  height: 1px; background: var(--accent);
  z-index: 200; width: 0%;
  transition: width .1s linear;
}

/* ── SECTION INDICATOR ── */
.section-indicator {
  position: fixed; bottom: 68px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex; flex-direction: row; gap: 10px;
  align-items: center;
}
.sec-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(0,0,0,.2);
  cursor: pointer;
  transition: background .3s, transform .3s;
}
.sec-dot.active { background: var(--black); transform: scale(1.8); }
.dark-bg .sec-dot { background: rgba(255,255,255,.2); }
.dark-bg .sec-dot.active { background: #fff; }
</style>
</head>

// ── QAパネルの縦スクロール→横移行 ──
const qaPanel = document.getElementById('qaPanel');
const qaInner = document.getElementById('qaInner');

function isInQaPanel() {
  // 現在のスクロール位置がQAパネルにいるか
  const rect = qaPanel.getBoundingClientRect();
  return rect.left <= 10 && rect.right >= window.innerWidth - 10;
}

// QAパネル内のホイールを縦スクロールに切り替え
window.addEventListener('wheel', e => {
  if (!isInQaPanel()) return;
  e.stopImmediatePropagation();
  const scrollTop = qaInner.scrollTop;
  const maxScroll = qaInner.scrollHeight - qaInner.clientHeight;

  // 下端に達したら次のパネルへ
  if (e.deltaY > 0 && scrollTop >= maxScroll - 8) {
    snapTo(currentSnapIdx + 1);
    return;
  }
  // 上端に達したら前のパネルへ
  if (e.deltaY < 0 && scrollTop <= 0) {
    snapTo(currentSnapIdx - 1);
    return;
  }
  qaInner.scrollTop += e.deltaY;
}, { capture: true });

// タッチでQAパネル内は縦スクロール
let qaTouch = false, qaTouchStartY = 0;
qaPanel.addEventListener('touchstart', e => {
  qaTouch = true;
  qaTouchStartY = e.touches[0].clientY;
}, { passive: true });
qaPanel.addEventListener('touchmove', e => {
  if (!qaTouch) return;
  const dy = qaTouchStartY - e.touches[0].clientY;
  const scrollTop = qaInner.scrollTop;
  const maxScroll = qaInner.scrollHeight - qaInner.clientHeight;
  // 上下端に達したら次のパネルへ（横移動）
  if (dy > 60 && scrollTop >= maxScroll - 8) { snapTo(currentSnapIdx + 1); qaTouch = false; return; }
  if (dy < -60 && scrollTop <= 0)             { snapTo(currentSnapIdx - 1); qaTouch = false; return; }
  // それ以外はブラウザの縦スクロールに任せる（qaInnerはoverflow-y:autoなので自然にスクロール）
}, { passive: true });
qaPanel.addEventListener('touchend', () => { qaTouch = false; });

// ── 全カード1枚ずつスナップスクロール ──
const wrap = document.getElementById('hWrap');
const panels = document.querySelectorAll('.panel');
let currentX = 0;
let targetX  = 0;
let raf;
let currentSnapIdx = 0;

// 全スナップ位置を取得（パネル先頭 + 各カード）
function getSnapPositions() {
  const positions = [];
  let accPanel = 0;
  panels.forEach(p => {
    const cards = p.querySelectorAll('.step, .g-photo');
    if (cards.length > 0) {
      const header = p.querySelector('.process-header, .gallery-header');
      const headerW = header ? header.offsetWidth : 0;
      const cardW = cards[0].offsetWidth;
      // パネル先頭（ヘッダーが見える位置）
      positions.push(-accPanel);
      // 各カード左端
      cards.forEach((card, i) => {
        positions.push(-(accPanel + headerW + cardW * i));
      });
    } else {
      positions.push(-accPanel);
    }
    accPanel += p.offsetWidth;
  });
  return positions;
}

function getMaxScroll() { return -(wrap.scrollWidth - window.innerWidth); }
function lerp(a, b, t) { return a + (b - a) * t; }

function snapTo(idx) {
  const positions = getSnapPositions();
  idx = Math.max(0, Math.min(positions.length - 1, idx));
  targetX = Math.max(getMaxScroll(), Math.min(0, positions[idx]));
  currentSnapIdx = idx;
}

function tick() {
  currentX = lerp(currentX, targetX, 0.1);
  if (Math.abs(currentX - targetX) < 0.3) currentX = targetX;
  wrap.style.transform = `translateX(${currentX}px)`;
  const pct = currentX / getMaxScroll() * 100;
  document.getElementById('progressBar').style.width = Math.min(100, Math.max(0, pct)) + '%';
  raf = requestAnimationFrame(tick);
}
raf = requestAnimationFrame(tick);

// ホイール — 1スクロールで1スナップ
let wheelAccum = 0, wheelTimer;
window.addEventListener('wheel', e => {
  e.preventDefault();
  wheelAccum += e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => { wheelAccum = 0; }, 400);
  if (Math.abs(wheelAccum) > 50) {
    snapTo(currentSnapIdx + (wheelAccum > 0 ? 1 : -1));
    wheelAccum = 0;
  }
}, { passive: false });

// タッチ — 1スワイプで1スナップ
let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
  // QAパネル内は縦スクロールを邪魔しない
  if (isInQaPanel()) return;
  e.preventDefault();
}, { passive: false });
window.addEventListener('touchend', e => {
  // QAパネル内は横スワイプを無視
  if (isInQaPanel()) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    snapTo(currentSnapIdx + (dx < 0 ? 1 : -1));
  }
});

window.addEventListener('resize', () => { snapTo(currentSnapIdx); });

// カスタムカーソル
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  let isDark = false;
  panels.forEach(p => {
    const rect = p.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right) {
      isDark = p.dataset.dark === 'true';
    }
  });
  cursor.classList.toggle('white', isDark);
});
document.querySelectorAll('button, .g-photo, .step').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// リサイズ
window.addEventListener('resize', () => {
  targetX = Math.max(getMaxScroll(), Math.min(0, targetX));
});

function shareLine(){ window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}`,'_blank'); }

    const l = document.getElementById('copyLabel');

  });
