<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YORISOU — komai home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:   #fafaf8;
  --off:     #f2f0ec;
  --light:   #e4e2dc;
  --mid:     #9a9890;
  --dark:    #3a3835;
  --black:   #1a1917;
  --accent:  #c8a882;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  background: var(--white);
  color: var(--black);
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed; z-index: 9999;
  width: 8px; height: 8px;
  background: var(--black);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: width .2s, height .2s, background .2s, border-color .2s;
}
.cursor.white { background: #fff; }
.cursor.big {
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--black);
}
.cursor.white.big {
  border-color: #fff;
}

/* ── HORIZONTAL WRAPPER ── */
.h-wrap {
  display: flex;
  height: 100vh;
  width: max-content;
  will-change: transform;
}

/* ── PANEL BASE ── */
.panel {
  height: 100vh;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

/* ══════════════
   HERO
══════════════ */
.panel-hero {
  width: 100vw;
  background: var(--white);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 8vh 8vw;
}
.hero-illust {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-40%, -50%);
  width: 90vw; height: 90vh;
  object-fit: contain;
  object-position: center center;
  opacity: .2;
}
.hero-text { position: relative; z-index: 1; }
.hero-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: .45em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 16px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 9vw, 120px);
  font-weight: 200; line-height: 1;
  letter-spacing: .04em;
  color: var(--black);
  white-space: nowrap;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
}
.hero-sub {
  margin-top: 28px;
  font-size: 13px; letter-spacing: .2em;
  color: var(--mid); line-height: 2;
}
.hero-sub span { color: var(--black); }
.hero-scroll {
  position: absolute;
  bottom: 10vh; right: 8vw;
  display: flex; flex-direction: row;
  align-items: center; gap: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .35em;
  text-transform: uppercase; color: var(--mid);
}
.hero-scroll::after {
  content: ''; height: 1px; width: 52px;
  background: linear-gradient(to right, var(--mid), transparent);
  animation: scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine {
  0%,100% { opacity:.3; transform:scaleX(.4); transform-origin:left; }
  50%      { opacity:1; transform:scaleX(1); }
}

/* ══════════════
   CONCEPT
══════════════ */
.panel-concept {
  width: 100vw;
  background: var(--black);
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.concept-left {
  padding: 14vh 8vw;
  display: flex; flex-direction: column;
  justify-content: center;
}
.concept-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  margin-bottom: 32px;
}
.concept-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 60px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: #fff;
  margin-bottom: 36px;
}
.concept-title em { color: var(--accent); font-style: normal; }
.concept-body {
  font-size: 13px; line-height: 2.3;
  color: rgba(255,255,255,.5);
  border-left: 1px solid rgba(255,255,255,.1);
  padding-left: 20px;
}
.concept-anagram {
  margin-top: 44px;
  display: flex; gap: 0; align-items: baseline;
}
.anagram-you {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; font-weight: 200;
  color: rgba(255,255,255,.15);
  letter-spacing: -.02em;
}
.anagram-plus {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: rgba(255,255,255,.2);
  margin: 0 8px;
}
.anagram-risou {
  font-size: 13px; letter-spacing: .2em;
  color: rgba(255,255,255,.25);
  writing-mode: vertical-rl;
  margin-left: 16px;
}
.anagram-eq {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: rgba(255,255,255,.2);
  margin: 0 8px;
}
.anagram-result {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 200; font-style: italic;
  color: var(--accent);
  letter-spacing: .06em;
}
.concept-right {
  position: relative; overflow: hidden;
}
.concept-illust {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: .35;
  filter: grayscale(30%);
}

/* ══════════════
   PROCESS
══════════════ */
.panel-process {
  width: max-content;
  min-width: 100vw;
  background: var(--off);
  display: flex;
  align-items: stretch;
}
.process-header {
  width: 28vw; min-width: 280px;
  padding: 14vh 6vw;
  display: flex; flex-direction: column;
  justify-content: center;
  flex-shrink: 0;
  border-right: 1px solid var(--light);
}
.process-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: var(--mid);
  margin-bottom: 20px;
}
.process-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: var(--black);
}
.process-desc {
  margin-top: 24px;
  font-size: 12px; color: var(--mid);
  line-height: 2;
}
.process-steps {
  display: flex;
  align-items: stretch;
  padding: 0;
}
.step {
  width: 220px; flex-shrink: 0;
  border-right: 1px solid var(--light);
  display: flex; flex-direction: column;
  position: relative;
  transition: background .3s;
}
.step:hover { background: var(--white); }
.step-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px; font-weight: 200;
  color: var(--light);
  line-height: 1;
  padding: 10vh 28px 0;
}
.step-photo {
  width: 100%; height: 200px;
  object-fit: cover;
  filter: grayscale(30%);
  transition: filter .4s;
}
.step:hover .step-photo { filter: grayscale(0); }
.step-ph {
  width: 100%; height: 200px;
  background: linear-gradient(135deg, var(--light) 0%, var(--off) 100%);
  display: flex; align-items: center; justify-content: center;
}
.step-ph span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: var(--mid);
}
.step-body {
  padding: 20px 28px 10vh;
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end;
}
.step-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .25em;
  color: var(--mid); margin-bottom: 8px;
}
.step-name {
  font-size: 13px; font-weight: 400;
  letter-spacing: .1em; color: var(--black);
  margin-bottom: 8px;
}
.step-memo {
  font-size: 11px; color: var(--mid);
  line-height: 1.8;
}

/* ══════════════
   GALLERY
══════════════ */
.panel-gallery {
  width: max-content;
  min-width: 100vw;
  background: var(--black);
  display: flex;
  align-items: stretch;
}
.gallery-header {
  width: 22vw; min-width: 220px;
  padding: 14vh 5vw;
  display: flex; flex-direction: column;
  justify-content: center; flex-shrink: 0;
  border-right: 1px solid rgba(255,255,255,.06);
}
.gallery-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: .4em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  margin-bottom: 20px;
}
.gallery-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 3.5vw, 42px);
  font-weight: 200; font-style: italic;
  line-height: 1.2; color: #fff;
}
.gallery-count {
  margin-top: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 200;
  color: rgba(255,255,255,.08);
}
.gallery-photos {
  display: flex; align-items: stretch;
  gap: 4px; padding: 4vh 4px;
}
.g-photo {
  flex-shrink: 0; overflow: hidden;
  position: relative; cursor: zoom-in;
}
.g-photo img {
  height: 100%; width: 100%;
  object-fit: cover; display: block;
  filter: grayscale(20%) brightness(.88);
  transition: filter .5s, transform .6s cubic-bezier(.22,1,.36,1);
}
.g-photo:hover img { filter: grayscale(0) brightness(1); transform: scale(1.04); }
.g-photo.tall  { width: 280px; }
.g-photo.wide  { width: 420px; }
.g-photo.sq    { width: 320px; }
.g-ph-dark {
  height: 100%; width: 100%;
  background: linear-gradient(135deg, #252320 0%, #1a1917 100%);
  display: flex; align-items: center; justify-content: center;
}
.g-ph-dark span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: rgba(255,255,255,.15);
}

/* ══════════════
   STICKY FOOTER
══════════════ */
.sticky-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(26,25,23,.92);
  backdrop-filter: blur(12px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 300;
  color: rgba(255,255,255,.4);
  letter-spacing: .15em;
}
.footer-share {
  display: flex; gap: 6px;
}
.footer-share-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 16px;
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.4);
  border: 0.5px solid rgba(255,255,255,.12);
  background: none; cursor: pointer;
  transition: color .2s, border-color .2s;
  font-family: inherit;
}
.footer-share-btn:hover { color: #fff; border-color: rgba(255,255,255,.4); }
.footer-share-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── PROGRESS BAR ── */
.progress-bar {
  position: fixed; top: 0; left: 0;
  height: 1px; background: var(--accent);
  z-index: 200; width: 0%;
  transition: width .1s linear;
}

/* ── SECTION INDICATOR ── */
.section-indicator {
  position: fixed; bottom: 68px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex; flex-direction: row; gap: 10px;
  align-items: center;
}
.sec-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(0,0,0,.2);
  cursor: pointer;
  transition: background .3s, transform .3s;
}
.sec-dot.active { background: var(--black); transform: scale(1.8); }
.dark-bg .sec-dot { background: rgba(255,255,255,.2); }
.dark-bg .sec-dot.active { background: #fff; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="progress-bar" id="progressBar"></div>



<!-- HORIZONTAL WRAPPER -->
<div class="h-wrap" id="hWrap">

  <!-- HERO -->
  <div class="panel panel-hero" data-dark="false">
    <img class="hero-illust" src="assets/illust_side.jpg" alt="平屋イラスト">
    <div style="position:relative;z-index:1;">
      <p class="hero-brand">komai home</p>
    </div>
    <div style="position:relative;z-index:1;">
      <h1 class="hero-title">YO<em>RISŌ</em>U</h1>
      <p class="hero-sub">あなたの理想（思い）は、家族に寄り添う──。</p>
    </div>
    <div class="hero-scroll">scroll</div>
  </div>

  <!-- CONCEPT -->
  <div class="panel panel-concept" data-dark="true">
    <div class="concept-left">
      <p class="concept-tag">Concept</p>
      <h2 class="concept-title">あなたの<em>理想（思い）</em>は<br><em>家族</em>に<br>寄り添う──。</h2>
      <p class="concept-body">
        暮らしの理想（RISŌ）は<br>
        家族ひとりひとり（YOU-あなた）の思いに<br>
        寄り添う住まい。<br>
        <br>
        "　家族の気配がいつでも感じられる距離。<br>
        　これが私のちょうどいい、<br>
        　私たち家族が叶える理想の家づくり。　"

      </p>
      <div class="concept-anagram">
        <span class="anagram-you">YOU</span>
        <span class="anagram-plus">+</span>
        <span class="anagram-risou">RISŌ<br>理想</span>
        <span class="anagram-eq">=</span>
        <span class="anagram-result">YORISOU</span>
      </div>
    </div>
    <div class="concept-right">
      <img class="concept-illust" src="illust_parse.png" alt="パース">
    </div>
  </div>

  <!-- PROCESS -->
  <div class="panel panel-process" data-dark="false">
    <div class="process-header">
      <p class="process-tag">Process</p>
      <h2 class="process-title">家ができる<br>まで。</h2>
      <p class="process-desc">
        地鎮祭から引き渡しまで、<br>
        すべての工程を記録しました。
      </p>
    </div>
    <div class="process-steps" id="processSteps">
      <!-- JSで生成 -->
    </div>
  </div>

  <!-- GALLERY -->
  <div class="panel panel-gallery" data-dark="true">
    <div class="gallery-header">
      <p class="gallery-tag">Gallery</p>
      <h2 class="gallery-title">完成<br>写真</h2>
      <div class="gallery-count" id="galleryCount">00</div>
    </div>
    <div class="gallery-photos" id="galleryPhotos">
      <!-- JSで生成 -->
    </div>
  </div>

</div>

<!-- STICKY FOOTER -->
<div class="sticky-footer">
  <span class="footer-brand">YORISOU</span>
  <div class="footer-share">
    <button class="footer-share-btn" onclick="shareX()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
      X
    </button>
    <button class="footer-share-btn" onclick="shareLine()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61V9.86h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      LINE
    </button>
    <button class="footer-share-btn" onclick="copyLink()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      <span id="copyLabel">COPY</span>
    </button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ▼ 工程を追加・編集するときはここだけ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const steps = [
  { num:'01', name:'地鎮祭',     date:'2024.04',  memo:'土地の神様への安全祈願', photo:'' },
  { num:'02', name:'基礎工事',   date:'2024.05',  memo:'遣り方・根切り・配筋・打設', photo:'' },
  { num:'03', name:'棟上げ',     date:'2024.06',  memo:'構造材を一気に組み上げる', photo:'' },
  { num:'04', name:'屋根工事',   date:'2024.07',  memo:'防水・ルーフィング・仕上げ', photo:'' },
  { num:'05', name:'外装工事',   date:'2024.07',  memo:'サイディング・開口部取付', photo:'' },
  { num:'06', name:'断熱工事',   date:'2024.08',  memo:'高断熱・高気密の施工', photo:'' },
  { num:'07', name:'内装下地',   date:'2024.08',  memo:'石膏ボード・電気配線', photo:'' },
  { num:'08', name:'内装仕上げ', date:'2024.09',  memo:'クロス・床・建具取付', photo:'' },
  { num:'09', name:'設備工事',   date:'2024.09',  memo:'キッチン・バス・トイレ', photo:'' },
  { num:'10', name:'外構工事',   date:'2024.10',  memo:'駐車場・植栽・フェンス', photo:'' },
  { num:'11', name:'完成検査',   date:'2024.10',  memo:'施主検査・最終確認', photo:'' },
  { num:'12', name:'引き渡し',   date:'2024.11',  memo:'鍵渡し・新しい暮らしへ', photo:'' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ▼ ギャラリー写真はここだけ編集
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const galleryPhotos = [
  { src:'assets/photo01.jpg', size:'tall' },
  { src:'assets/photo02.jpg', size:'wide' },
  { src:'assets/photo03.jpg', size:'sq'   },
  { src:'assets/photo04.jpg', size:'tall' },
  { src:'assets/photo05.jpg', size:'wide' },
  { src:'assets/photo06.jpg', size:'sq'   },
  { src:'assets/photo07.jpg', size:'tall' },
  { src:'assets/photo08.jpg', size:'sq'   },
];

// ── 工程ステップ生成 ──
const stepsEl = document.getElementById('processSteps');
steps.forEach(s => {
  const el = document.createElement('div');
  el.className = 'step';
  el.innerHTML = `
    <div class="step-num">${s.num}</div>
    ${s.photo
      ? `<img class="step-photo" src="${s.photo}" alt="${s.name}">`
      : `<div class="step-ph"><span>photo</span></div>`}
    <div class="step-body">
      <div class="step-date">${s.date}</div>
      <div class="step-name">${s.name}</div>
      <div class="step-memo">${s.memo}</div>
    </div>`;
  stepsEl.appendChild(el);
});

// ── ギャラリー生成 ──
const galEl = document.getElementById('galleryPhotos');
document.getElementById('galleryCount').textContent =
  String(galleryPhotos.length).padStart(2,'0');
galleryPhotos.forEach(p => {
  const el = document.createElement('div');
  el.className = `g-photo ${p.size}`;
  el.innerHTML = p.src
    ? `<img src="${p.src}" alt="">`
    : `<div class="g-ph-dark"><span>photo</span></div>`;
  galEl.appendChild(el);
});

// ── 縦→横スクロール変換 ──
const wrap = document.getElementById('hWrap');
let currentX = 0;
let targetX  = 0;
let raf;

function getMaxScroll() {
  return -(wrap.scrollWidth - window.innerWidth);
}

function lerp(a, b, t) { return a + (b - a) * t; }

function tick() {
  currentX = lerp(currentX, targetX, 0.08);
  if (Math.abs(currentX - targetX) < 0.5) currentX = targetX;
  wrap.style.transform = `translateX(${currentX}px)`;

  // progress bar
  const pct = currentX / getMaxScroll() * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  raf = requestAnimationFrame(tick);
}
raf = requestAnimationFrame(tick);

window.addEventListener('wheel', e => {
  e.preventDefault();
  targetX = Math.max(getMaxScroll(), Math.min(0, targetX - e.deltaY * 1.2));
}, { passive: false });

// タッチ
let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    e.preventDefault();
    targetX = Math.max(getMaxScroll(), Math.min(0, targetX - dx * 1.5));
    touchStartX = e.touches[0].clientX;
  }
}, { passive: false });

// セクションインジケーター
// セクションインジケーター削除済み

// カスタムカーソル
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  // カーソル位置のパネルのdark属性を確認
  const panels = document.querySelectorAll('.panel');
  let isDark = false;
  panels.forEach(p => {
    const rect = p.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right) {
      isDark = p.dataset.dark === 'true';
    }
  });
  cursor.classList.toggle('white', isDark);
});
document.querySelectorAll('button, .g-photo, .step').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// リサイズ
window.addEventListener('resize', () => {
  targetX = Math.max(getMaxScroll(), Math.min(0, targetX));
});
